<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Decorative neural dots -->
  <circle cx="100" cy="150" r="4" fill="#6366f1" opacity="0.3"/>
  <circle cx="180" cy="100" r="3" fill="#818cf8" opacity="0.2"/>
  <circle cx="250" cy="180" r="5" fill="#6366f1" opacity="0.25"/>
  <circle cx="1050" cy="120" r="4" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1100" cy="200" r="3" fill="#a78bfa" opacity="0.2"/>
  <circle cx="980" cy="160" r="5" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="150" cy="480" r="4" fill="#6366f1" opacity="0.2"/>
  <circle cx="1080" cy="500" r="4" fill="#8b5cf6" opacity="0.2"/>
  <!-- Connecting lines -->
  <line x1="100" y1="150" x2="180" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="100" x2="250" y2="180" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="150" x2="250" y2="180" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
  <line x1="1050" y1="120" x2="1100" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="980" y1="160" x2="1050" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <line x1="980" y1="160" x2="1100" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.1"/>
  <!-- Icon (small neural network) -->
  <circle cx="600" cy="180" r="20" fill="#6366f1" opacity="0.8"/>
  <circle cx="540" cy="220" r="14" fill="#818cf8" opacity="0.6"/>
  <circle cx="660" cy="220" r="14" fill="#818cf8" opacity="0.6"/>
  <line x1="600" y1="180" x2="540" y2="220" stroke="#a5b4fc" stroke-width="2" opacity="0.5"/>
  <line x1="600" y1="180" x2="660" y2="220" stroke="#a5b4fc" stroke-width="2" opacity="0.5"/>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="-1">AI World</text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="28" fill="#a5b4fc">The Complete History of Artificial Intelligence</text>
  <!-- Date range -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="22" fill="#94a3b8">1943 — Present</text>
  <!-- Bottom accent -->
  <rect x="500" y="500" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
