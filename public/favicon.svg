<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Neural network nodes and connections -->
  <!-- Layer 1 (left) -->
  <circle cx="130" cy="160" r="24" fill="url(#glow)" opacity="0.9"/>
  <circle cx="130" cy="256" r="24" fill="url(#glow)" opacity="0.9"/>
  <circle cx="130" cy="352" r="24" fill="url(#glow)" opacity="0.9"/>
  <!-- Layer 2 (middle) -->
  <circle cx="256" cy="176" r="28" fill="#fff" opacity="0.95"/>
  <circle cx="256" cy="336" r="28" fill="#fff" opacity="0.95"/>
  <!-- Layer 3 (right) -->
  <circle cx="382" cy="256" r="32" fill="#fff"/>
  <!-- Connections L1→L2 -->
  <line x1="154" y1="160" x2="228" y2="176" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="154" y1="160" x2="228" y2="336" stroke="#c7d2fe" stroke-width="3" opacity="0.4"/>
  <line x1="154" y1="256" x2="228" y2="176" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="154" y1="256" x2="228" y2="336" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="154" y1="352" x2="228" y2="176" stroke="#c7d2fe" stroke-width="3" opacity="0.4"/>
  <line x1="154" y1="352" x2="228" y2="336" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <!-- Connections L2→L3 -->
  <line x1="284" y1="176" x2="350" y2="256" stroke="#e0e7ff" stroke-width="4" opacity="0.8"/>
  <line x1="284" y1="336" x2="350" y2="256" stroke="#e0e7ff" stroke-width="4" opacity="0.8"/>
  <!-- Central pulse ring -->
  <circle cx="382" cy="256" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- "AW" text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="60" fill="#fff" opacity="0.9" letter-spacing="6">AW</text>
</svg>
